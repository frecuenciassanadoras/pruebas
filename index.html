<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincronizador Binaural App</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- VARIABLES DE TEMA --- */
        :root {
            --bg-color: #16162a;
            --card-bg: #22223b;
            --text-main: #ffffff;
            --text-muted: #8b8ea5;
            --border-color: rgba(255, 255, 255, 0.1);
            --color-left: #00d4ff;
            --color-right: #a64bf4;
        }

        [data-theme="light"] {
            --bg-color: #f4f5f9;
            --card-bg: #ffffff;
            --text-main: #1a1a2e;
            --text-muted: #666666;
            --border-color: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
            padding: 20px;
        }

        /* --- HEADER Y BOTONES --- */
        .top-nav {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .icon-btn {
            font-size: 1.5rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.3s;
            background: none;
            border: none;
        }
        
        .icon-btn:hover { color: var(--text-main); }

        /* --- MENÚ LATERAL (SIDEBAR) --- */
        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 99; backdrop-filter: blur(3px);
            opacity: 0; visibility: hidden; transition: 0.3s;
        }
        .sidebar-overlay.active { opacity: 1; visibility: visible; }

        .sidebar {
            position: fixed; top: 0; left: -280px; width: 260px; height: 100%;
            background: var(--card-bg); z-index: 100;
            box-shadow: 5px 0 15px rgba(0,0,0,0.3);
            transition: 0.3s ease-in-out;
            padding: 30px 20px; display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        
        .sidebar-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;
        }
        .sidebar-header h2 { font-size: 1.2rem; color: var(--text-main); margin: 0; font-weight: 800; letter-spacing: 1px;}
        .sidebar-header h2 span { color: var(--color-left); }
        .close-menu { color: var(--text-muted); font-size: 1.5rem; cursor: pointer; transition: 0.3s;}
        .close-menu:hover { color: #ef4444; }

        .logout-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px; 
            padding: 14px; color: #ef4444; font-weight: 600; text-decoration: none;
            border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 10px;
            margin-top: auto; transition: 0.3s; background: rgba(239, 68, 68, 0.05);
            font-size: 0.95rem;
        }
        .logout-btn:hover { background: #ef4444; color: #fff; box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3); }

        /* --- APP CONTAINER --- */
        .app-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- ORÁCULO --- */
        .oracle-section {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
        }

        .oracle-input {
            width: 100%;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 15px 20px;
            border-radius: 15px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            margin-bottom: 15px;
            outline: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .oracle-input::placeholder { color: var(--text-muted); }

        .btn-oracle {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-oracle:hover { border-color: var(--text-main); color: var(--text-main); }

        .oracle-result {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.4;
            margin-top: 20px;
            color: var(--text-main);
            min-height: 30px;
        }

        /* --- VISUALIZADOR DE ONDAS --- */
        .visualizer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 120px;
            margin-bottom: 30px;
            width: 100%;
        }

        .bar {
            width: 6px;
            border-radius: 50px;
            background: var(--text-muted);
            transition: height 0.2s ease, background-color 0.5s ease, box-shadow 0.5s ease;
        }

        .bar:nth-child(-n+15) { background-color: var(--color-left); }
        .bar:nth-child(n+16) { background-color: var(--color-right); }

        .visualizer.playing .bar {
            animation: soundWave 1.2s infinite ease-in-out alternate;
        }

        .visualizer.playing .bar:nth-child(-n+15) { box-shadow: 0 0 10px var(--color-left); }
        .visualizer.playing .bar:nth-child(n+16) { box-shadow: 0 0 10px var(--color-right); }

        @keyframes soundWave {
            0% { height: 10px; }
            100% { height: 100px; }
        }

        /* --- BOTÓN PLAY GIGANTE --- */
        .play-ring {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(to right, var(--color-left), var(--color-right));
            padding: 3px; 
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .play-ring:active { transform: scale(0.95); }

        .play-btn-inner {
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            color: var(--text-main);
            transition: background-color 0.4s ease;
        }

        /* --- CONTROLES DE TIEMPO Y PROGRESO --- */
        .progress-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .time-labels {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .timer-select {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }

        .progress-bar {
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            background: var(--border-color);
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }

        .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--text-main);
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* --- SELECTORES INFERIORES --- */
        .selectors-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            gap: 20px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .selector-box {
            flex: 1;
            text-align: center;
        }

        .selector-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            display: block;
        }

        .freq-select {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            text-align: center;
            text-align-last: center;
            outline: none;
            cursor: pointer;
            appearance: none; 
        }
        
        .freq-select option {
            background: var(--bg-color);
            color: var(--text-main);
            font-weight: normal;
        }

        .selector-box.left .freq-select { color: var(--color-left); }
        .selector-box.right .freq-select { color: var(--color-right); }

        /* --- ORÁCULO DE SIGNIFICADO DE SINERGIA --- */
        .synergy-meaning-box {
            width: 100%;
            background: var(--card-bg);
            border: 1px dashed var(--border-color);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .synergy-meaning-box strong {
            color: var(--text-main);
        }

        /* Controles de Volumen */
        .volume-control {
            margin-top: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-muted);
            width: 100%;
            max-width: 300px;
        }
        
        .vol-slider {
            flex: 1;
            accent-color: var(--text-muted);
            height: 4px;
            background: var(--border-color);
            border-radius: 5px;
            outline: none;
            -webkit-appearance: auto;
        }

        /* --- MODO MEDITACIÓN PROFUNDA (PANTALLA NEGRA) --- */
        .meditation-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s ease;
        }

        .meditation-overlay.active {
            opacity: 1;
            pointer-events: all;
            cursor: pointer;
        }

        .meditation-text {
            color: #333333; 
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-align: center;
            animation: breathe 4s infinite alternate ease-in-out;
        }

        @keyframes breathe {
            0% { opacity: 0.2; transform: scale(0.98); }
            100% { opacity: 0.8; transform: scale(1.02); }
        }
    </style>
</head>
<body>

    <div class="meditation-overlay" id="meditation-overlay" onclick="toggleMeditationMode()">
        <div class="meditation-text">
            <i class="fas fa-lock" style="font-size: 2rem; margin-bottom: 15px; display: block;"></i>
            PANTALLA BLOQUEADA<br>TOCA PARA SALIR
        </div>
    </div>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>NEURO<span>SYNC</span></h2>
            <i class="fas fa-times close-menu" onclick="toggleMenu()"></i>
        </div>
        
        <div style="flex-grow: 1;"></div>
        
        <a href="https://reproductor-frecuencias.netlify.app/" onclick="sessionStorage.clear();" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
        </a>
    </div>

    <div class="top-nav">
        <i class="fas fa-bars icon-btn" onclick="toggleMenu()"></i>
        
        <div>
            <button class="icon-btn" onclick="toggleMeditationMode()" title="Bloquear Pantalla (Modo Meditación)" style="margin-right: 15px;">
                <i class="fas fa-lock"></i>
            </button>
            <button class="icon-btn" onclick="toggleTheme()" id="theme-icon">
                <i class="fas fa-sun"></i>
            </button>
        </div>
    </div>

    <div class="app-container">
        
        <div class="oracle-section">
            <input type="text" id="oracle-input" class="oracle-input" placeholder="Ej: Siento estrés, deudas o ansiedad...">
            <button class="btn-oracle" onclick="analyzeEnergy()">Generar Sinergia</button>
            <div id="oracle-result" class="oracle-result">
                Ajusta las frecuencias a tu medida.
            </div>
        </div>

        <div class="visualizer" id="visualizer">
        </div>

        <div class="play-ring" onclick="toggleMasterPlay()">
            <div class="play-btn-inner" id="play-btn">
                <i class="fas fa-play" style="margin-left: 5px;"></i>
            </div>
        </div>

        <div class="progress-wrapper">
            <div class="time-labels">
                <span id="time-current">00:00</span>
                <select id="time-select" class="timer-select" onchange="handleTimerChange()">
                    <option value="bucle">Bucle ∞</option>
                    <option value="900">Apagar en 15 min</option>
                    <option value="1800">Apagar en 30 min</option>
                    <option value="3600">Apagar en 60 min</option>
                </select>
                <span id="time-total">00:00</span>
            </div>
            <input type="range" id="progress-bar" class="progress-bar" value="0" min="0" max="100" step="0.1">
        </div>

        <div class="selectors-container">
            <div class="selector-box left">
                <span class="selector-label">Oído Izquierdo</span>
                <select id="select-left" class="freq-select" onchange="updateUI()"></select>
            </div>
            
            <div class="selector-box right">
                <span class="selector-label">Oído Derecho</span>
                <select id="select-right" class="freq-select" onchange="updateUI()"></select>
            </div>
        </div>

        <div class="synergy-meaning-box" id="synergy-meaning">
            Sinergia Activa: Selecciona tus frecuencias...
        </div>

        <div class="volume-control">
            <i class="fas fa-volume-down"></i>
            <input type="range" id="vol-slider" class="vol-slider" min="0" max="1" step="0.05" value="0.8" onchange="changeVolume()">
            <i class="fas fa-volume-up"></i>
        </div>

    </div>

    <audio id="audio-left" loop crossorigin="anonymous" playsinline preload="auto" x-webkit-airplay="allow"></audio>
    <audio id="audio-right" loop crossorigin="anonymous" playsinline preload="auto" x-webkit-airplay="allow"></audio>

    <script>
        // --- BASE DE DATOS ---
        const frequencies = [
            { id: "111", hz: "111 Hz", desc: "Paz", color: "#f5f6fa", url: "https://f005.backblazeb2.com/file/mis-frecuencias-musicales/111+Hz.mp3?v=1" },
            { id: "174", hz: "174 Hz", desc: "Alivio", color: "#d4af37", url: "https://f005.backblazeb2.com/file/mis-frecuencias-musicales/174+Hz.mp3?v=1" },
            { id: "285", hz: "285 Hz", desc: "Aura", color: "#ff4757", url: "https://f005.backblazeb2.com/file/mis-frecuencias-musicales/285+Hz.mp3?v=1" },
            { id: "396", hz: "396 Hz", desc: "Valor", color: "#ff6b81", url: "https://f005.backblazeb2.com/file/mis-frecuencias-musicales/396+Hz.mp3?v=1" },
            { id: "417", hz: "417 Hz", desc: "Cambio", color: "#ffa502", url: "https://f005.backblazeb2.com/file/mis-frecuencias-musicales/417+Hz.mp3?v=1" },
            { id: "432", hz: "432 Hz", desc: "Armonía", color: "#1e90ff", url: "https://f005.backblazeb2.com/file/mis-frecuencias-musicales/432+Hz.mp3?v=1" },
            { id: "528", hz: "528 Hz", desc: "Amor", color: "#2ed573", url: "https://f005.backblazeb2.com/file/mis-frecuencias-musicales/528+Hz.mp3?v=1" },
            { id: "639", hz: "639 Hz", desc: "Unión", color: "#ff7f50", url: "https://f005.backblazeb2.com/file/mis-frecuencias-musicales/639+Hz.mp3?v=1" },
            { id: "741", hz: "741 Hz", desc: "Intuición", color: "#7bed9f", url: "https://f005.backblazeb2.com/file/mis-frecuencias-musicales/741+Hz.mp3?v=1" },
            { id: "852", hz: "852 Hz", desc: "Visión", color: "#3742fa", url: "https://f005.backblazeb2.com/file/mis-frecuencias-musicales/852+Hz.mp3?v=1" },
            { id: "888", hz: "888 Hz", desc: "Riqueza", color: "#f1c40f", url: "https://f005.backblazeb2.com/file/mis-frecuencias-musicales/888+Hz.mp3?v=1" },
            { id: "963", hz: "963 Hz", desc: "Divino", color: "#9c88ff", url: "https://f005.backblazeb2.com/file/mis-frecuencias-musicales/963+Hz.mp3?v=1" },
            { id: "999", hz: "999 Hz", desc: "Cierre", color: "#eccc68", url: "https://f005.backblazeb2.com/file/mis-frecuencias-musicales/999+Hz.mp3?v=1" }
        ];

        const selectLeft = document.getElementById('select-left');
        const selectRight = document.getElementById('select-right');
        const audioL = document.getElementById('audio-left');
        const audioR = document.getElementById('audio-right');
        const playBtn = document.getElementById('play-btn');
        const volSlider = document.getElementById('vol-slider');
        const visualizer = document.getElementById('visualizer');
        const rootVars = document.documentElement.style;
        
        const progressBar = document.getElementById('progress-bar');
        const timeCurrent = document.getElementById('time-current');
        const timeTotal = document.getElementById('time-total');
        const timeSelect = document.getElementById('time-select');
        const synergyMeaning = document.getElementById('synergy-meaning');

        let isPlaying = false;
        let currentL_ID = null;
        let currentR_ID = null;
        
        let audioCtx, pannerL, pannerR;
        let isAudioApiInitialized = false;
        let sessionTimer = null;

        function createVisualizer() {
            for(let i = 0; i < 30; i++) {
                let bar = document.createElement('div');
                bar.classList.add('bar');
                let baseHeight = Math.floor(Math.random() * 20) + 10;
                bar.style.height = baseHeight + 'px';
                bar.style.animationDelay = (Math.random() * 1.5) + 's';
                visualizer.appendChild(bar);
            }
        }

        function initSelectors() {
            frequencies.forEach(f => {
                selectLeft.add(new Option(`${f.hz} - ${f.desc}`, f.id));
                selectRight.add(new Option(`${f.hz} - ${f.desc}`, f.id));
            });
            selectLeft.value = "432";
            selectRight.value = "888";
            updateUI();
        }

        function getFreqById(id) { return frequencies.find(f => f.id === id); }

        function updateSynergyMeaning(fL, fR) {
            if(fL.id === fR.id) {
                synergyMeaning.innerHTML = `Sintonización Pura: Estás potenciando la energía de <strong>${fL.desc}</strong> en ambos hemisferios. Ideal para meditación profunda.`;
            } else {
                synergyMeaning.innerHTML = `Sinergia Activa: Instalando <strong>${fL.desc}</strong> en tu plano subconsciente (Izquierdo), para proyectar y manifestar <strong>${fR.desc}</strong> en tu realidad consciente (Derecho).`;
            }
        }

        function updateUI() {
            const fL = getFreqById(selectLeft.value);
            const fR = getFreqById(selectRight.value);
            
            rootVars.setProperty('--color-left', fL.color);
            rootVars.setProperty('--color-right', fR.color);
            
            updateSynergyMeaning(fL, fR); 
            
            let trackChanged = false;

            if (currentL_ID !== fL.id) {
                audioL.src = fL.url;
                audioL.load();
                currentL_ID = fL.id;
                trackChanged = true;
            }

            if (currentR_ID !== fR.id) {
                audioR.src = fR.url;
                audioR.load();
                currentR_ID = fR.id;
                trackChanged = true;
            }

            if(isPlaying && trackChanged) {
                audioL.play().catch(e => console.log(e));
                audioR.play().catch(e => console.log(e));
                setupMediaSession(fL, fR); 
            }
        }

        function initWebAudioAPI() {
            if(isAudioApiInitialized) return;

            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();

            const trackL = audioCtx.createMediaElementSource(audioL);
            const trackR = audioCtx.createMediaElementSource(audioR);

            if(audioCtx.createStereoPanner) {
                pannerL = audioCtx.createStereoPanner();
                pannerL.pan.value = -1;
                pannerR = audioCtx.createStereoPanner();
                pannerR.pan.value = 1;
            } else {
                pannerL = audioCtx.createPanner(); pannerL.setPosition(-1, 0, 0);
                pannerR = audioCtx.createPanner(); pannerR.setPosition(1, 0, 0);
            }

            trackL.connect(pannerL).connect(audioCtx.destination);
            trackR.connect(pannerR).connect(audioCtx.destination);

            isAudioApiInitialized = true;
        }

        function setupMediaSession(fL, fR) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: `Sinergia: ${fL.hz} & ${fR.hz}`,
                    artist: 'NeuroSync Sincronizador',
                    album: `Izquierdo: ${fL.desc} | Derecho: ${fR.desc}`,
                    artwork: [{ src: 'https://cdn-icons-png.flaticon.com/512/3048/3048122.png', sizes: '512x512', type: 'image/png' }]
                });
                navigator.mediaSession.setActionHandler('play', () => { if (!isPlaying) toggleMasterPlay(); });
                navigator.mediaSession.setActionHandler('pause', () => { if (isPlaying) toggleMasterPlay(); });
            }
        }

        function handleTimerChange() {
            if(isPlaying) {
                startSessionTimer();
            }
        }

        function startSessionTimer() {
            clearTimeout(sessionTimer); 
            const duration = timeSelect.value;
            
            if (duration === "bucle") return; 

            const totalMs = parseInt(duration) * 1000;
            sessionTimer = setTimeout(() => {
                if (isPlaying) {
                    toggleMasterPlay(); 
                    alert("Tu sesión de frecuencias cuánticas ha terminado. ¡Bien hecho!");
                }
            }, totalMs);
        }

        function toggleMasterPlay() {
            initWebAudioAPI();
            if(audioCtx.state === 'suspended') audioCtx.resume();

            if (isPlaying) {
                audioL.pause();
                audioR.pause();
                playBtn.innerHTML = '<i class="fas fa-play" style="margin-left: 5px;"></i>';
                visualizer.classList.remove('playing');
                clearTimeout(sessionTimer); 
            } else {
                updateUI();
                audioL.play().catch(e => console.log(e));
                audioR.play().catch(e => console.log(e));
                
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                visualizer.classList.add('playing');
                
                setupMediaSession(getFreqById(selectLeft.value), getFreqById(selectRight.value));
                startSessionTimer(); 
            }
            isPlaying = !isPlaying;

            if ('mediaSession' in navigator) {
                navigator.mediaSession.playbackState = isPlaying ? "playing" : "paused";
            }
        }

        function changeVolume() {
            audioL.volume = volSlider.value;
            audioR.volume = volSlider.value;
        }

        function toggleTheme() {
            const body = document.body;
            const themeIcon = document.getElementById('theme-icon');
            
            if (body.getAttribute('data-theme') === 'light') {
                body.removeAttribute('data-theme');
                themeIcon.innerHTML = '<i class="fas fa-sun"></i>';
            } else {
                body.setAttribute('data-theme', 'light');
                themeIcon.innerHTML = '<i class="fas fa-moon"></i>';
            }
        }

        function analyzeEnergy() {
            const input = document.getElementById('oracle-input').value.toLowerCase();
            const resultText = document.getElementById('oracle-result');
            
            if(input.length < 3) {
                alert("Cuéntame qué deseas sanar o manifestar.");
                return;
            }

            let recLeft = "432"; let recRight = "888";
            let msg = "Alineación General Detectada.";

            if(["dinero", "deuda", "abundancia", "ventas"].some(w => input.includes(w))) {
                recLeft = "432"; recRight = "888";
                msg = "Sinergia de Abundancia lista.";
            } else if(["ansiedad", "miedo", "estres", "dormir"].some(w => input.includes(w))) {
                recLeft = "396"; recRight = "111";
                msg = "Sinergia de Paz y Liberación lista.";
            } else if(["salud", "dolor", "sanar"].some(w => input.includes(w))) {
                recLeft = "174"; recRight = "528";
                msg = "Sinergia de Restauración Física lista.";
            } else if(["amor", "pareja", "soledad"].some(w => input.includes(w))) {
                recLeft = "639"; recRight = "528";
                msg = "Sinergia de Amor y Conexión lista.";
            }

            resultText.innerHTML = msg;
            
            selectLeft.value = recLeft;
            selectRight.value = recRight;
            updateUI();
            if(!isPlaying) toggleMasterPlay();
        }

        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        function formatTime(seconds) {
            if(isNaN(seconds)) return "00:00";
            let m = Math.floor(seconds / 60);
            let s = Math.floor(seconds % 60);
            return (m < 10 ? '0'+m : m) + ':' + (s < 10 ? '0'+s : s);
        }

        audioL.addEventListener('timeupdate', () => {
            if (!audioL.duration) return;
            const progress = (audioL.currentTime / audioL.duration) * 100;
            progressBar.value = progress;
            timeCurrent.textContent = formatTime(audioL.currentTime);
            timeTotal.textContent = formatTime(audioL.duration);
        });

        progressBar.addEventListener('input', (e) => {
            if(!audioL.duration) return;
            const seekTime = (e.target.value / 100) * audioL.duration;
            audioL.currentTime = seekTime;
            audioR.currentTime = seekTime;
        });

        let wakeLock = null;
        const meditationOverlay = document.getElementById('meditation-overlay');
        let isMeditationMode = false;

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake Lock activado: Pantalla encendida.');
                }
            } catch (err) {
                console.error(`Error de Wake Lock: ${err.name}, ${err.message}`);
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release()
                    .then(() => { wakeLock = null; console.log('Wake Lock liberado.'); });
            }
        }

        function toggleMeditationMode() {
            isMeditationMode = !isMeditationMode;
            if (isMeditationMode) {
                meditationOverlay.classList.add('active');
                requestWakeLock();
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen().catch(err => console.log(err));
                }
            } else {
                meditationOverlay.classList.remove('active');
                releaseWakeLock();
                if (document.fullscreenElement) {
                    document.exitFullscreen().catch(err => console.log(err));
                }
            }
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && isMeditationMode) {
                requestWakeLock();
            }
        });

        createVisualizer();
        initSelectors();

    </script>
</body>
</html>
